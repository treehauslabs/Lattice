name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Run tests
        run: |
          swift test 2>&1 | tee test-output.txt
          PASSED=$(grep -c "passed" test-output.txt || true)
          FAILED=$(grep -c "failed" test-output.txt || true)
          echo "Tests passed: $PASSED"
          echo "Tests failed: $FAILED"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            exit 1
          fi

      - name: Build LatticeNode executable
        run: swift build --target LatticeNode -c release

      - name: Verify LatticeNode runs
        run: swift run LatticeNode --help
